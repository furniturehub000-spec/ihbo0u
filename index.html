              <input type="text" id="af_newCategory" placeholder="Add new category..." style="flex:1;padding:0.4rem 0.6rem;font-size:0.85rem">
              <button type="button" id="af_addCategory" style="padding:0.4rem 0.8rem;font-size:0.8rem;background:#635bff;color:#fff;border:none;border-radius:4px;cursor:pointer">Add</button>
            </div>
          </div>
          <div class="admin-field">
            <label>Stock Status</label>
            <div class="admin-stock-options" id="af_stockOptions">
              <label class="admin-radio-option">
                <input type="radio" name="stockStatus" value="in_stock" ${!isEdit || p.stock_status !== 'ships' ? 'checked' : ''}>
                <span>In Stock - Ready to Ship</span>
              </label>
              <label class="admin-radio-option">
                <input type="radio" name="stockStatus" value="ships" ${isEdit && p.stock_status === 'ships' ? 'checked' : ''}>
                <span>Needs to Ship</span>
              </label>
            </div>
            <div id="af_shippingEtaRow" style="margin-top:0.5rem;display:${isEdit && p.stock_status === 'ships' ? 'block' : 'none'}">
              <input type="text" id="af_shippingEta" value="${isEdit && p.shipping_eta ? p.shipping_eta : ''}" placeholder="e.g. 2-3 weeks, 5-7 business days">
              <div style="font-size:0.7rem;color:#697386;margin-top:0.2rem">Estimated shipping time shown to customers</div>
            </div>
          </div>
          <div class="admin-field-row">
            <div class="admin-field">
              <label>Badge (optional)</label>
              <input type="text" id="af_badge" value="${isEdit ? (p.badge || '') : ''}" placeholder="e.g. Best Seller, New Arrival">
              <div style="font-size:0.7rem;color:#697386;margin-top:0.2rem">Leave empty for no badge</div>
            </div>
            <div class="admin-field">
              <label>Product Link (internal only)</label>
              <input type="url" id="af_link" value="${isEdit && p.link ? p.link : ''}" placeholder="https://supplier.com/product...">
              <div style="font-size:0.7rem;color:#697386;margin-top:0.2rem">Customers won't see this link</div>
            </div>
          </div>
          <div class="admin-field">
            <label>Product Image</label>
            ${isEdit && p.image ? `<div style="margin-bottom:0.5rem"><img src="${p.image}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid #e3e8ee"></div>` : ''}
            <input type="file" id="af_image" accept="image/*" style="padding:0.4rem 0">
            <div style="font-size:0.7rem;color:#697386;margin-top:0.2rem">Suggested resolution: 1024×1024 (same as current photos)${isEdit ? ' • Leave empty to keep current image' : ''}</div>
          </div>
          <div class="admin-field">
            <label>Description</label>
            <textarea id="af_desc">${isEdit ? p.description : ''}</textarea>
          </div>
          <div class="admin-field">
            <label>Specs</label>
            <div class="admin-specs-list" id="af_specs">
              ${specs.map(([label, value], i) => `
                <div class="admin-spec-row" data-idx="${i}">
                  <input type="text" placeholder="Label" class="spec-label" value="${label}">
                  <input type="text" placeholder="Value" class="spec-value" value="${value}">
                  <button class="admin-spec-remove">&times;</button>
                </div>
              `).join('')}
            </div>
            <button class="admin-spec-add" id="af_addSpec">+ Add Spec</button>
          </div>
          <div class="admin-form-actions">
            <button class="admin-save-btn" id="af_save">${isEdit ? 'Save Changes' : 'Add Product'}</button>
            <button class="admin-cancel-btn" id="af_cancel">Cancel</button>
          </div>
          <div id="af_status" style="margin-top:1rem"></div>
        </div>
      `;

      document.getElementById('af_addCategory').addEventListener('click', () => {
        const input = document.getElementById('af_newCategory');
        const newCat = input.value.trim();
        if (!newCat) return;
        const container = document.getElementById('af_categories');
        const exists = [...container.querySelectorAll('input[type="checkbox"]')].some(cb => cb.value === newCat);
        if (exists) {
          input.value = '';
          return;
        }
        const label = document.createElement('label');
        label.className = 'admin-category-checkbox';
        label.innerHTML = `<input type="checkbox" value="${newCat}" checked><span>${newCat}</span>`;
        container.appendChild(label);
        input.value = '';
      });

      document.querySelectorAll('input[name="stockStatus"]').forEach(radio => {
        radio.addEventListener('change', () => {
          const etaRow = document.getElementById('af_shippingEtaRow');
          etaRow.style.display = radio.value === 'ships' && radio.checked ? 'block' : 'none';
        });
      });

      document.getElementById('af_addSpec').addEventListener('click', () => {
        const list = document.getElementById('af_specs');
        const idx = list.children.length;
        const row = document.createElement('div');
        row.className = 'admin-spec-row';
        row.dataset.idx = idx;
        row.innerHTML = `
          <input type="text" placeholder="Label" class="spec-label" value="">
          <input type="text" placeholder="Value" class="spec-value" value="">
          <button class="admin-spec-remove">&times;</button>
        `;
        list.appendChild(row);
        wireSpecRemove(row);
      });

      adminBody.querySelectorAll('.admin-spec-remove').forEach(btn => wireSpecRemove(btn.closest('.admin-spec-row')));

      document.getElementById('af_cancel').addEventListener('click', () => {
        editingProductId = null;
        renderAdminPage();
      });

      document.getElementById('af_save').addEventListener('click', async () => {
        const saveBtn = document.getElementById('af_save');
        const statusEl = document.getElementById('af_status');
        const name = document.getElementById('af_name').value.trim();
        const selectedCategories = [...document.querySelectorAll('#af_categories input[type="checkbox"]:checked')].map(cb => cb.value);
        const cost = Number(document.getElementById('af_cost').value);
        const badge = document.getElementById('af_badge').value.trim();
        const link = document.getElementById('af_link').value.trim();
        const stockStatus = document.querySelector('input[name="stockStatus"]:checked').value;
        const shippingEta = document.getElementById('af_shippingEta').value.trim();
        const imageFile = document.getElementById('af_image').files[0];
        const description = document.getElementById('af_desc').value.trim();

        if (!name || !cost || selectedCategories.length === 0) {
          statusEl.innerHTML = '<div style="color:#df1b41;font-size:0.85rem">Please fill in name, cost, and select at least one category.</div>';
          return;
        }

        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving...';
        statusEl.innerHTML = '';

        const specRows = document.querySelectorAll('#af_specs .admin-spec-row');
        const newSpecs = [];
        specRows.forEach(row => {
          const l = row.querySelector('.spec-label').value.trim();
          const v = row.querySelector('.spec-value').value.trim();
          if (l && v) newSpecs.push([l, v]);
        });

        const category = selectedCategories[0];
        const categories = selectedCategories;

        try {
          let image_url = isEdit ? p.image_url : null;

          if (imageFile) {
            const fileName = Date.now() + '-' + imageFile.name.replace(/[^a-zA-Z0-9.-]/g, '_');
            const { data: uploadData, error: uploadErr } = await sbAdmin.storage
              .from('product-images')
              .upload(fileName, imageFile, { contentType: imageFile.type, upsert: true });
            if (uploadErr) throw new Error('Image upload failed: ' + uploadErr.message);
            const { data: { publicUrl } } = sbAdmin.storage.from('product-images').getPublicUrl(fileName);
            image_url = publicUrl;
          }

          const productData = {
            name, category, categories, cost, 
            badge: badge || null, 
            description, 
            specs: newSpecs, 
            image_url, 
            link: link || null,
            stock_status: stockStatus,
            shipping_eta: stockStatus === 'ships' ? shippingEta : null
          };

          if (isEdit) {
            const { error } = await sbAdmin.from('products').update(productData).eq('id', p.id);
            if (error) throw new Error('Update failed: ' + error.message);
          } else {
            if (!image_url) {
              saveBtn.disabled = false;
              saveBtn.textContent = 'Add Product';
              statusEl.innerHTML = '<div style="color:#df1b41;font-size:0.85rem">Please select an image for the new product.</div>';
              return;
            }
            const { error } = await sbAdmin.from('products').insert(productData);
            if (error) throw new Error('Insert failed: ' + error.message);
          }

          await loadProducts();
          editingProductId = null;
          renderAdminPage();
        } catch (err) {
          saveBtn.disabled = false;
          saveBtn.textContent = isEdit ? 'Save Changes' : 'Add Product';
          statusEl.innerHTML = `<div style="color:#df1b41;font-size:0.85rem">${err.message}</div>`;
        }
      });
    }

    function wireSpecRemove(row) {
      row.querySelector('.admin-spec-remove').addEventListener('click', () => row.remove());
    }

    // ---- Delete Confirm ----

    function showDeleteConfirm(productId) {
      const p = products.find(x => x.id === productId);
      if (!p) return;

      const overlay = document.createElement('div');
      overlay.className = 'admin-confirm-overlay';
      overlay.innerHTML = `
        <div class="admin-confirm-box">
          <div class="admin-confirm-title">Delete Product?</div>
          <div class="admin-confirm-msg">Are you sure you want to delete <strong>${p.name}</strong>? This cannot be undone.</div>
          <div class="admin-confirm-actions">
            <button class="admin-confirm-delete" id="confirmDeleteYes">Delete</button>
            <button class="admin-confirm-cancel" id="confirmDeleteNo">Cancel</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      document.getElementById('confirmDeleteYes').addEventListener('click', async () => {
        const btn = document.getElementById('confirmDeleteYes');
        btn.disabled = true;
        btn.textContent = 'Deleting...';
        try {
          const { error } = await sbAdmin.from('products').delete().eq('id', productId);
          if (error) throw error;
          await loadProducts();
          overlay.remove();
          renderAdminPage();
        } catch (err) {
          btn.disabled = false;
          btn.textContent = 'Delete';
          alert('Error deleting product: ' + err.message);
        }
      });

      document.getElementById('confirmDeleteNo').addEventListener('click', () => {
        overlay.remove();
      });

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) overlay.remove();
      });
    }

    // =================== INIT ===================

    async function init() {
      await loadProducts();
      renderCategories();
      renderProducts();
    }

    init();
  </script>

</body>
</html>
