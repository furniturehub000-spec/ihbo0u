<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Furniture Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ece7df;
      cursor: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      font-family: 'Inter', sans-serif;
    }

    /* ===================== SPLASH SCREEN ===================== */

    #splashScreen {
      position: fixed;
      inset: 0;
      z-index: 100;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    #splashScreen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .image-wall {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      padding: 4px 0;
    }

    .image-row {
      display: flex;
      gap: 8px;
      width: max-content;
      will-change: transform;
    }

    .image-row img {
      height: calc(25vh - 10px);
      width: auto;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 12px;
      display: block;
      pointer-events: none;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.12);
    }

    .row-right { animation: scrollRight 60s linear infinite; }
    .row-left { animation: scrollLeft 60s linear infinite; }

    @keyframes scrollRight {
      0% { transform: translateX(0); }
      100% { transform: translateX(calc(-50% - 4px)); }
    }
    @keyframes scrollLeft {
      0% { transform: translateX(calc(-50% - 4px)); }
      100% { transform: translateX(0); }
    }

    .splash-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .splash-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(236, 231, 223, 0.6) 100%);
    }

    .prompt-box {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1.5px solid rgba(0, 0, 0, 0.1);
      border-radius: 24px;
      padding: 3rem 4.5rem;
      text-align: center;
      box-shadow:
        0 12px 48px rgba(0, 0, 0, 0.12),
        0 0 0 1px rgba(255, 255, 255, 0.6) inset;
      animation: boxGlow 3s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }

    .prompt-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: clamp(3rem, 5.5vw, 5.5rem);
      color: #1a1a1a;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.35;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .prompt-divider {
      width: 80px;
      height: 2px;
      background: #1a1a1a;
      margin: 1.5rem auto;
      opacity: 0.3;
    }

    .prompt-sub {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(1.1rem, 2.2vw, 1.8rem);
      color: rgba(0, 0, 0, 0.4);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }

    @keyframes boxGlow {
      0%, 100% {
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(255, 255, 255, 0.6) inset;
      }
      50% {
        box-shadow: 0 16px 64px rgba(0, 0, 0, 0.18), 0 0 0 1px rgba(255, 255, 255, 0.8) inset, 0 0 80px rgba(255, 255, 255, 0.15);
      }
    }

    /* ===================== CATALOG SCREEN ===================== */

    #catalogScreen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: row;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.6s ease 0.4s, visibility 0.6s ease 0.4s;
      background: #ece7df;
    }

    .catalog-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    #catalogScreen.visible {
      opacity: 1;
      visibility: visible;
    }

    .catalog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1.5rem;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      flex-shrink: 0;
    }

    .catalog-logo {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 1.3rem;
      color: #1a1a1a;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .catalog-header-right {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .catalog-count {
      font-size: 0.85rem;
      color: rgba(0, 0, 0, 0.4);
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .header-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1rem;
      border-radius: 100px;
      border: 1.5px solid rgba(0, 0, 0, 0.12);
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      color: #444;
      cursor: pointer;
      transition: all 0.2s ease;
      touch-action: manipulation;
      position: relative;
    }

    .header-btn:active {
      background: rgba(0, 0, 0, 0.06);
    }

    .header-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }


    .category-bar {
      display: flex;
      gap: 0.5rem;
      padding: 0.4rem 1.5rem;
      background: rgba(255, 255, 255, 0.4);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      flex-shrink: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .category-btn {
      padding: 0.5rem 1.3rem;
      border-radius: 100px;
      border: 1.5px solid rgba(0, 0, 0, 0.12);
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: #444;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.25s ease;
      letter-spacing: 0.03em;
      touch-action: manipulation;
    }

    .category-btn.active {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }

    .category-btn .cat-count {
      font-weight: 400;
      opacity: 0.6;
      margin-left: 0.3rem;
      font-size: 0.85rem;
    }

    .product-grid-wrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
      transition: flex 0.35s ease;
    }

    .product-grid {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0.5rem 1rem;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: calc((100vh - 100px) / 2 - 0.5rem);
      gap: 0.5rem;
      align-content: start;
      transition: opacity 0.25s ease;
    }

    .product-grid::-webkit-scrollbar { width: 4px; }
    .product-grid::-webkit-scrollbar-track { background: transparent; }
    .product-grid::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

    .product-grid.fading {
      opacity: 0;
    }

    .product-card {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      cursor: pointer;
      touch-action: manipulation;
      opacity: 0;
      transform: translateY(16px);
      animation: cardIn 0.4s ease forwards;
      transition: box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .product-card:active {
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.12), inset 0 0 0 2px rgba(0, 0, 0, 0.08);
    }

    @keyframes cardIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .product-card-img {
      width: 100%;
      flex: 1;
      min-height: 0;
      object-fit: contain;
      background: #f8f6f3;
      padding: 0.3rem;
    }

    .product-card-info {
      flex-shrink: 0;
      padding: 0.4rem 0.6rem 0.5rem;
    }

    .product-card-category {
      font-size: 0.55rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(0, 0, 0, 0.35);
      margin-bottom: 0.1rem;
    }

    .product-card-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 0.9rem;
      color: #1a1a1a;
      line-height: 1.2;
      margin-bottom: 0.1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .product-card-price {
      font-size: 0.85rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    /* ===================== ORDER SIDEBAR ===================== */

    .order-sidebar {
      width: 0;
      overflow: hidden;
      background: #fff;
      border-left: 1px solid rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      transition: width 0.35s ease;
      flex-shrink: 0;
    }

    .order-sidebar.open {
      width: 340px;
    }

    .order-sidebar-inner {
      width: 340px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .order-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 1rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      flex-shrink: 0;
    }

    .order-header-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .order-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 1.2rem;
      color: #1a1a1a;
      letter-spacing: 0.05em;
    }

    .order-item-count {
      font-size: 0.7rem;
      font-weight: 500;
      background: #ece7df;
      color: #666;
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
    }


    .order-items {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0.5rem 0;
    }

    .order-items::-webkit-scrollbar { width: 3px; }
    .order-items::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

    .order-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: rgba(0, 0, 0, 0.25);
      font-size: 0.85rem;
      font-style: italic;
    }

    .order-item {
      display: flex;
      gap: 0.6rem;
      padding: 0.6rem 1rem;
      align-items: center;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .order-item-img {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      object-fit: contain;
      background: #f8f6f3;
      flex-shrink: 0;
      padding: 2px;
    }

    .order-item-details {
      flex: 1;
      min-width: 0;
    }

    .order-item-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 0.85rem;
      color: #1a1a1a;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .order-item-price {
      font-size: 0.75rem;
      color: rgba(0, 0, 0, 0.45);
      font-weight: 500;
      margin-top: 0.1rem;
    }

    .order-item-qty {
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
    }

    .qty-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.12);
      background: transparent;
      font-size: 1rem;
      color: #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }

    .qty-btn:active { background: rgba(0,0,0,0.05); }

    .qty-val {
      width: 28px;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    .order-item-remove {
      width: 26px;
      height: 26px;
      border: none;
      background: transparent;
      color: rgba(0, 0, 0, 0.25);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      touch-action: manipulation;
      border-radius: 50%;
    }

    .order-item-remove:active { background: rgba(0,0,0,0.04); color: #c00; }

    .order-footer {
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      padding: 0.8rem 1rem;
      flex-shrink: 0;
    }

    .order-subtotal {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
    }

    .order-subtotal-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: #666;
    }

    .order-subtotal-value {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1a1a1a;
    }

    .order-clear-btn {
      width: 100%;
      padding: 0.55rem;
      border-radius: 8px;
      border: 1.5px solid rgba(0, 0, 0, 0.1);
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      color: #888;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 0.2s;
    }

    .order-clear-btn:active { background: rgba(0,0,0,0.04); }

    /* ===================== PRODUCT DETAIL MODAL ===================== */

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .modal-backdrop.open {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: #fff;
      border-radius: 24px;
      width: 85%;
      max-width: 1100px;
      max-height: 85vh;
      display: flex;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.2);
      transform: scale(0.95) translateY(20px);
      transition: transform 0.35s ease;
    }

    .modal-backdrop.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal-image {
      flex: 1;
      background: #f8f6f3;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      min-height: 400px;
    }

    .modal-image img {
      max-width: 100%;
      max-height: 60vh;
      object-fit: contain;
    }

    .modal-details {
      flex: 1;
      padding: 2rem 2.5rem;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .modal-top-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 0.8rem;
      flex-shrink: 0;
    }

    .modal-close {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1.2rem;
      border-radius: 100px;
      border: 1.5px solid rgba(0,0,0,0.1);
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: #444;
      cursor: pointer;
      transition: background 0.2s;
      touch-action: manipulation;
      height: 44px;
    }

    .modal-close:active { background: rgba(0,0,0,0.05); }

    .modal-close svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .modal-category {
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(0, 0, 0, 0.35);
      margin-bottom: 0.4rem;
    }

    .modal-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 2rem;
      color: #1a1a1a;
      line-height: 1.25;
      margin-bottom: 0.5rem;
    }

    .modal-price {
      font-size: 1.4rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 1rem;
    }

    .modal-divider {
      width: 100%;
      height: 1px;
      background: rgba(0,0,0,0.08);
      margin-bottom: 1rem;
    }

    .modal-desc {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #555;
      font-weight: 300;
      margin-bottom: 1rem;
    }

    .modal-specs {
      list-style: none;
      margin-bottom: 1.2rem;
    }

    .modal-specs li {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      font-size: 0.85rem;
    }

    .modal-specs li span:first-child {
      color: rgba(0, 0, 0, 0.4);
      font-weight: 400;
    }

    .modal-specs li span:last-child {
      color: #1a1a1a;
      font-weight: 500;
    }

    .modal-badge {
      display: inline-block;
      padding: 0.4rem 1rem;
      background: #eef7ee;
      color: #2d7a2d;
      font-size: 0.8rem;
      font-weight: 500;
      border-radius: 8px;
      align-self: flex-start;
      margin-bottom: 1.2rem;
    }

    .add-to-order-btn {
      width: 100%;
      padding: 0.9rem;
      border-radius: 12px;
      border: none;
      background: #1a1a1a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.2s;
      letter-spacing: 0.04em;
      margin-top: auto;
      flex-shrink: 0;
    }

    .add-to-order-btn:active {
      background: #333;
    }

  </style>
</head>
<body>

  <!-- =================== SPLASH =================== -->
  <div id="splashScreen">
    <div class="image-wall" id="imageWall"></div>
    <div class="splash-overlay" id="splashOverlay">
      <div class="prompt-box">
        <div class="prompt-text">Touch Anywhere<br>To Begin</div>
        <div class="prompt-divider"></div>
        <div class="prompt-sub">Browse Our Full Catalog</div>
      </div>
    </div>
  </div>

  <!-- =================== CATALOG =================== -->
  <div id="catalogScreen">
    <div class="catalog-main">
      <div class="catalog-header">
        <div class="catalog-logo">Furniture Hub</div>
        <div class="catalog-header-right">
          <div class="catalog-count" id="productCount"></div>
          <button class="header-btn" id="homeBtn">
            <svg viewBox="0 0 24 24"><path d="M3 12L12 3l9 9"/><path d="M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1V10"/></svg>
            Home
          </button>
        </div>
      </div>
      <div class="category-bar" id="categoryBar"></div>
      <div class="product-grid-wrapper">
        <div class="product-grid" id="productGrid"></div>
      </div>
    </div>
    <div class="order-sidebar" id="orderSidebar">
      <div class="order-sidebar-inner">
        <div class="order-header">
          <div class="order-header-left">
            <div class="order-title">Your Order</div>
            <div class="order-item-count" id="orderItemCount">0 items</div>
          </div>
        </div>
        <div class="order-items" id="orderItems">
          <div class="order-empty">No items added yet</div>
        </div>
        <div class="order-footer" id="orderFooter">
          <div class="order-subtotal">
            <span class="order-subtotal-label">Subtotal</span>
            <span class="order-subtotal-value" id="orderSubtotal">$0</span>
          </div>
          <button class="order-clear-btn" id="orderClearBtn">Clear Order</button>
        </div>
      </div>
    </div>
  </div>

  <!-- =================== MODAL =================== -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modal">
      <div class="modal-image" id="modalImage"></div>
      <div class="modal-details" id="modalDetails"></div>
    </div>
  </div>


  <script>
    const imageFiles = [
      'PRODUCT PHOTOS/ChatGPT Image Mar 30, 2026, 09_35_18 PM.png',
      'PRODUCT PHOTOS/ChatGPT Image Mar 30, 2026, 09_35_37 PM.png',
      'PRODUCT PHOTOS/ChatGPT Image Mar 30, 2026, 09_36_04 PM.png',
      'PRODUCT PHOTOS/ChatGPT Image Mar 30, 2026, 09_36_40 PM.png',
      'PRODUCT PHOTOS/ChatGPT Image Mar 30, 2026, 09_37_36 PM.png',
      'PRODUCT PHOTOS/ChatGPT Image Mar 30, 2026, 09_53_24 PM.png',
      'PRODUCT PHOTOS/ChatGPT Image Mar 30, 2026, 09_55_06 PM.png',
      'PRODUCT PHOTOS/ChatGPT Image Mar 30, 2026, 09_56_38 PM.png',

    const products = [

      { id: 12, name: 'Hudson 3-Seat Sofa', category: 'Living Room', price: 1599, image: imageFiles[11],

        specs: [['Dimensions','84"W x 36"D x 33"H'],['Material','Polyester blend fabric'],['Frame','Kiln-dried hardwood'],['Cushions','High-resilience foam'],['Color','Charcoal Black'],['Assembly','Legs only']], badge: 'Best Seller' }
    ];

    const categories = ['All', 'Living Room', 'Bedroom', 'Dining', 'Office', 'Gaming'];
    let activeCategory = 'All';

    function formatPrice(n) {
      return '$' + n.toLocaleString('en-US');
    }

    // =================== ORDER STATE ===================

    let orderItems = [];
    let sidebarOpen = false;

    function addToOrder(product) {
      const existing = orderItems.find(item => item.product.id === product.id);
      if (existing) {
        existing.quantity++;
      } else {
        orderItems.push({ product, quantity: 1 });
      }
      if (!sidebarOpen) toggleSidebar(true);
      renderOrder();
    }

    function removeFromOrder(productId) {
      orderItems = orderItems.filter(item => item.product.id !== productId);
      renderOrder();
      if (orderItems.length === 0) toggleSidebar(false);
    }

    function updateQuantity(productId, delta) {
      const item = orderItems.find(item => item.product.id === productId);
      if (!item) return;
      item.quantity += delta;
      if (item.quantity <= 0) {
        removeFromOrder(productId);
        return;
      }
      renderOrder();
    }

    function clearOrder() {
      orderItems = [];
      renderOrder();
      toggleSidebar(false);
    }

    function getSubtotal() {
      return orderItems.reduce((sum, item) => sum + item.product.price * item.quantity, 0);
    }

    function getTotalItems() {
      return orderItems.reduce((sum, item) => sum + item.quantity, 0);
    }

    function renderOrder() {
      const container = document.getElementById('orderItems');
      const countEl = document.getElementById('orderItemCount');
      const subtotalEl = document.getElementById('orderSubtotal');
      const total = getTotalItems();

      countEl.textContent = total + ' item' + (total !== 1 ? 's' : '');
      subtotalEl.textContent = formatPrice(getSubtotal());

      if (orderItems.length === 0) {
        container.innerHTML = '<div class="order-empty">No items added yet</div>';
        return;
      }

      container.innerHTML = orderItems.map(item => `
        <div class="order-item">
          <img class="order-item-img" src="${encodeURI(item.product.image)}" alt="${item.product.name}">
          <div class="order-item-details">
            <div class="order-item-name">${item.product.name}</div>
            <div class="order-item-price">${formatPrice(item.product.price)} each</div>
          </div>
          <div class="order-item-qty">
            <button class="qty-btn" data-id="${item.product.id}" data-delta="-1">&minus;</button>
            <span class="qty-val">${item.quantity}</span>
            <button class="qty-btn" data-id="${item.product.id}" data-delta="1">+</button>
          </div>
          <button class="order-item-remove" data-id="${item.product.id}">&times;</button>
        </div>
      `).join('');

      container.querySelectorAll('.qty-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          updateQuantity(Number(btn.dataset.id), Number(btn.dataset.delta));
        });
      });

      container.querySelectorAll('.order-item-remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          removeFromOrder(Number(btn.dataset.id));
        });
      });
    }

    // =================== SIDEBAR TOGGLE ===================

    const orderSidebar = document.getElementById('orderSidebar');

    function toggleSidebar(open) {
      sidebarOpen = (open !== undefined) ? open : !sidebarOpen;
      if (sidebarOpen) {
        orderSidebar.classList.add('open');
      } else {
        orderSidebar.classList.remove('open');
      }
    }

    document.getElementById('orderClearBtn').addEventListener('click', () => {
      clearOrder();
    });

    // =================== SPLASH SCREEN ===================

    const wall = document.getElementById('imageWall');
    const directions = ['row-right', 'row-left', 'row-right', 'row-left'];

    for (let r = 0; r < 4; r++) {
      const row = document.createElement('div');
      row.className = 'image-row ' + directions[r];
      const shuffled = [...imageFiles].sort(() => Math.random() - 0.5);
      for (let copy = 0; copy < 2; copy++) {
        shuffled.forEach(src => {
          const img = document.createElement('img');
          img.src = encodeURI(src);
          img.alt = 'Product';
          img.loading = (copy === 0) ? 'eager' : 'lazy';
          row.appendChild(img);
        });
      }
      wall.appendChild(row);
    }

    // =================== SCREEN TRANSITIONS ===================

    const splashScreen = document.getElementById('splashScreen');
    const splashOverlay = document.getElementById('splashOverlay');
    const catalogScreen = document.getElementById('catalogScreen');

    function showCatalog() {
      splashScreen.classList.add('hidden');
      catalogScreen.classList.add('visible');
    }

    function showSplash() {
      closeModal();
      toggleSidebar(false);
      catalogScreen.classList.remove('visible');
      splashScreen.classList.remove('hidden');
      activeCategory = 'All';
      renderCategories();
      renderProducts();
    }

    splashOverlay.addEventListener('click', showCatalog);
    splashOverlay.addEventListener('touchstart', showCatalog, { passive: true });

    document.getElementById('homeBtn').addEventListener('click', showSplash);

    // =================== CATEGORY BAR ===================

    const categoryBar = document.getElementById('categoryBar');

    function getCategoryCount(cat) {
      if (cat === 'All') return products.length;
      return products.filter(p => p.category === cat).length;
    }

    function renderCategories() {
      categoryBar.innerHTML = '';
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'category-btn' + (cat === activeCategory ? ' active' : '');
        const count = getCategoryCount(cat);
        btn.innerHTML = cat + '<span class="cat-count">(' + count + ')</span>';
        btn.addEventListener('click', () => {
          if (cat === activeCategory) return;
          activeCategory = cat;
          renderCategories();
          switchCategory();
        });
        categoryBar.appendChild(btn);
      });
    }

    // =================== PRODUCT GRID ===================

    const productGrid = document.getElementById('productGrid');
    const productCount = document.getElementById('productCount');

    function switchCategory() {
      productGrid.classList.add('fading');
      setTimeout(() => {
        productGrid.scrollTop = 0;
        renderProducts();
        productGrid.classList.remove('fading');
      }, 250);
    }

    function renderProducts() {
      productGrid.innerHTML = '';
      const filtered = activeCategory === 'All'
        ? products
        : products.filter(p => p.category === activeCategory);

      productCount.textContent = filtered.length + ' product' + (filtered.length !== 1 ? 's' : '');

      filtered.forEach((product, i) => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.style.animationDelay = (i * 0.06) + 's';

        card.innerHTML = `
          <img class="product-card-img" src="${encodeURI(product.image)}" alt="${product.name}">
          <div class="product-card-info">
            <div class="product-card-category">${product.category}</div>
            <div class="product-card-name">${product.name}</div>
            <div class="product-card-price">${formatPrice(product.price)}</div>
          </div>
        `;

        card.addEventListener('click', () => {
          openModal(product);
        });

        productGrid.appendChild(card);
      });
    }

    // =================== MODAL ===================

    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalImage = document.getElementById('modalImage');
    const modalDetails = document.getElementById('modalDetails');
    let currentModalProduct = null;

    function openModal(product) {
      currentModalProduct = product;
      const specsHTML = product.specs.map(([label, value]) =>
        `<li><span>${label}</span><span>${value}</span></li>`
      ).join('');

      modalImage.innerHTML = `<img src="${encodeURI(product.image)}" alt="${product.name}">`;
      modalDetails.innerHTML = `
        <div class="modal-top-bar">
          <button class="modal-close" id="modalClose">
            <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            Back to Catalog
          </button>
        </div>
        <div class="modal-category">${product.category}</div>
        <div class="modal-name">${product.name}</div>
        <div class="modal-price">${formatPrice(product.price)}</div>
        <div class="modal-divider"></div>
        <div class="modal-desc">${product.description}</div>
        <ul class="modal-specs">${specsHTML}</ul>
        <div class="modal-badge">${product.badge}</div>
        <button class="add-to-order-btn" id="addToOrderBtn">Add to Order</button>
      `;

      document.getElementById('modalClose').addEventListener('click', (e) => {
        e.stopPropagation();
        closeModal();
      });

      document.getElementById('addToOrderBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        addToOrder(product);
        closeModal();
      });

      modalBackdrop.classList.add('open');
    }

    function closeModal() {
      modalBackdrop.classList.remove('open');
      currentModalProduct = null;
    }

    modalBackdrop.addEventListener('click', (e) => {
      if (e.target === modalBackdrop) {
        closeModal();
      }
    });


    // =================== INIT ===================

    renderCategories();
    renderProducts();
  </script>
