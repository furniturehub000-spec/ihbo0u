<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Furniture Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ece7df;
      cursor: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      font-family: 'Inter', sans-serif;
    }

    /* ===================== SPLASH SCREEN ===================== */

    #splashScreen {
      position: fixed;
      inset: 0;
      z-index: 100;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    #splashScreen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .image-wall {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      padding: 4px 0;
    }

    .image-row {
      display: flex;
      gap: 8px;
      width: max-content;
      will-change: transform;
    }

    .image-row img {
      height: calc(25vh - 10px);
      width: auto;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 12px;
      display: block;
      pointer-events: none;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.12);
    }

    .row-right { animation: scrollRight 60s linear infinite; }
    .row-left { animation: scrollLeft 60s linear infinite; }

    @keyframes scrollRight {
      0% { transform: translateX(0); }
      100% { transform: translateX(calc(-50% - 4px)); }
    }
    @keyframes scrollLeft {
      0% { transform: translateX(calc(-50% - 4px)); }
      100% { transform: translateX(0); }
    }

    .splash-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .splash-overlay::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(236, 231, 223, 0.6) 100%);
    }

    .prompt-box {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1.5px solid rgba(0, 0, 0, 0.1);
      border-radius: 24px;
      padding: 3rem 4.5rem;
      text-align: center;
      box-shadow:
        0 12px 48px rgba(0, 0, 0, 0.12),
        0 0 0 1px rgba(255, 255, 255, 0.6) inset;
      animation: boxGlow 3s ease-in-out infinite;
      position: relative;
      z-index: 2;
    }

    .prompt-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: clamp(3rem, 5.5vw, 5.5rem);
      color: #1a1a1a;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.35;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .prompt-divider {
      width: 80px;
      height: 2px;
      background: #1a1a1a;
      margin: 1.5rem auto;
      opacity: 0.3;
    }

    .prompt-sub {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: clamp(1.1rem, 2.2vw, 1.8rem);
      color: rgba(0, 0, 0, 0.4);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }

    @keyframes boxGlow {
      0%, 100% {
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.12), 0 0 0 1px rgba(255, 255, 255, 0.6) inset;
      }
      50% {
        box-shadow: 0 16px 64px rgba(0, 0, 0, 0.18), 0 0 0 1px rgba(255, 255, 255, 0.8) inset, 0 0 80px rgba(255, 255, 255, 0.15);
      }
    }

    /* ===================== CATALOG SCREEN ===================== */

    #catalogScreen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: row;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.6s ease 0.4s, visibility 0.6s ease 0.4s;
      background: #ece7df;
    }

    .catalog-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    #catalogScreen.visible {
      opacity: 1;
      visibility: visible;
    }

    .catalog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1.5rem;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      flex-shrink: 0;
    }

    .catalog-logo {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 1.3rem;
      color: #1a1a1a;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .catalog-header-right {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .catalog-count {
      font-size: 0.85rem;
      color: rgba(0, 0, 0, 0.4);
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    .header-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1rem;
      border-radius: 100px;
      border: 1.5px solid rgba(0, 0, 0, 0.12);
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      color: #444;
      cursor: pointer;
      transition: all 0.2s ease;
      touch-action: manipulation;
      position: relative;
    }

    .header-btn:active {
      background: rgba(0, 0, 0, 0.06);
    }

    .header-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }


    .category-bar {
      display: flex;
      gap: 0.5rem;
      padding: 0.4rem 1.5rem;
      background: rgba(255, 255, 255, 0.4);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      flex-shrink: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .category-btn {
      padding: 0.5rem 1.3rem;
      border-radius: 100px;
      border: 1.5px solid rgba(0, 0, 0, 0.12);
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: #444;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.25s ease;
      letter-spacing: 0.03em;
      touch-action: manipulation;
    }

    .category-btn.active {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }

    .category-btn .cat-count {
      font-weight: 400;
      opacity: 0.6;
      margin-left: 0.3rem;
      font-size: 0.85rem;
    }

    .product-grid-wrapper {
      flex: 1;
      overflow: hidden;
      position: relative;
      transition: flex 0.35s ease;
    }

    .product-grid {
      width: 100%;
      height: 100%;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0.5rem 1rem;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: calc((100vh - 100px) / 2 - 0.5rem);
      gap: 0.5rem;
      align-content: start;
      transition: opacity 0.25s ease;
    }

    .product-grid::-webkit-scrollbar { width: 4px; }
    .product-grid::-webkit-scrollbar-track { background: transparent; }
    .product-grid::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }

    .product-grid.fading {
      opacity: 0;
    }

    .product-card {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      cursor: pointer;
      touch-action: manipulation;
      opacity: 0;
      transform: translateY(16px);
      animation: cardIn 0.4s ease forwards;
      transition: box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .product-card:active {
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.12), inset 0 0 0 2px rgba(0, 0, 0, 0.08);
    }

    @keyframes cardIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .product-card-img {
      width: 100%;
      flex: 1;
      min-height: 0;
      object-fit: contain;
      background: #f8f6f3;
      padding: 0.3rem;
    }

    .product-card-info {
      flex-shrink: 0;
      padding: 0.4rem 0.6rem 0.5rem;
    }

    .product-card-category {
      font-size: 0.55rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(0, 0, 0, 0.35);
      margin-bottom: 0.1rem;
    }

    .product-card-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 0.9rem;
      color: #1a1a1a;
      line-height: 1.2;
      margin-bottom: 0.1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .product-card-price {
      font-size: 0.85rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    /* ===================== ORDER SIDEBAR ===================== */

    .order-sidebar {
      width: 0;
      overflow: hidden;
      background: #fff;
      border-left: 1px solid rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      transition: width 0.35s ease;
      flex-shrink: 0;
    }

    .order-sidebar.open {
      width: 340px;
    }

    .order-sidebar-inner {
      width: 340px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .order-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 1rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      flex-shrink: 0;
    }

    .order-header-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .order-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 1.2rem;
      color: #1a1a1a;
      letter-spacing: 0.05em;
    }

    .order-item-count {
      font-size: 0.7rem;
      font-weight: 500;
      background: #ece7df;
      color: #666;
      padding: 0.15rem 0.5rem;
      border-radius: 100px;
    }


    .order-items {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0.5rem 0;
    }

    .order-items::-webkit-scrollbar { width: 3px; }
    .order-items::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 2px; }

    .order-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: rgba(0, 0, 0, 0.25);
      font-size: 0.85rem;
      font-style: italic;
    }

    .order-item {
      display: flex;
      gap: 0.6rem;
      padding: 0.6rem 1rem;
      align-items: center;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .order-item-img {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      object-fit: contain;
      background: #f8f6f3;
      flex-shrink: 0;
      padding: 2px;
    }

    .order-item-details {
      flex: 1;
      min-width: 0;
    }

    .order-item-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 0.85rem;
      color: #1a1a1a;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .order-item-price {
      font-size: 0.75rem;
      color: rgba(0, 0, 0, 0.45);
      font-weight: 500;
      margin-top: 0.1rem;
    }

    .order-item-down {
      font-size: 0.7rem;
      color: #1a1a1a;
      font-weight: 600;
      margin-top: 0.1rem;
    }

    .order-item-qty {
      display: flex;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
    }

    .qty-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.12);
      background: transparent;
      font-size: 1rem;
      color: #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }

    .qty-btn:active { background: rgba(0,0,0,0.05); }

    .qty-val {
      width: 28px;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    .order-item-remove {
      width: 26px;
      height: 26px;
      border: none;
      background: transparent;
      color: rgba(0, 0, 0, 0.25);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      touch-action: manipulation;
      border-radius: 50%;
    }

    .order-item-remove:active { background: rgba(0,0,0,0.04); color: #c00; }

    .order-footer {
      border-top: 1px solid rgba(0, 0, 0, 0.08);
      padding: 0.8rem 1rem;
      flex-shrink: 0;
    }

    .order-subtotal {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
    }

    .order-subtotal-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: #666;
    }

    .order-subtotal-value {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1a1a1a;
    }

    .order-confirm-btn {
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      background: #1a1a1a;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 0.2s;
    }

    .order-confirm-btn:hover { background: #333; }
    .order-confirm-btn:active { background: #000; }

    .order-confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .order-confirm-box {
      background: #fff;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 320px;
      width: 90%;
    }

    .order-confirm-icon {
      width: 60px;
      height: 60px;
      background: #0d9488;
      color: #fff;
      font-size: 2rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }

    .order-confirm-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 0.5rem;
    }

    .order-confirm-number {
      font-size: 0.85rem;
      font-weight: 600;
      color: #635bff;
      background: #f0f4ff;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      font-family: monospace;
      letter-spacing: 0.05em;
    }

    .order-confirm-msg {
      font-size: 0.9rem;
      color: #697386;
      margin-bottom: 1.5rem;
    }

    .order-confirm-done {
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      border: none;
      background: #1a1a1a;
      font-size: 0.9rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
    }

    .order-confirm-done:hover { background: #333; }

    .order-review-box {
      background: #fff;
      border-radius: 16px;
      max-width: 480px;
      width: 95%;
      max-height: 90vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .review-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid #e3e8ee;
    }

    .review-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    .review-close {
      width: 32px;
      height: 32px;
      border: none;
      background: #f6f8fa;
      border-radius: 50%;
      font-size: 1.25rem;
      color: #697386;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .review-close:hover { background: #e3e8ee; }

    .review-items {
      padding: 1rem 1.5rem;
      max-height: 200px;
      overflow-y: auto;
      border-bottom: 1px solid #e3e8ee;
    }

    .review-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0;
    }

    .review-item + .review-item {
      border-top: 1px solid #f0f0f0;
    }

    .review-item-img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 8px;
      background: #f6f8fa;
    }

    .review-item-details {
      flex: 1;
      min-width: 0;
    }

    .review-item-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: #1a1a1a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .review-item-plan {
      font-size: 0.8rem;
      color: #697386;
    }

    .review-item-due {
      text-align: right;
      flex-shrink: 0;
    }

    .review-item-amount {
      font-weight: 600;
      font-size: 0.95rem;
      color: #1a1a1a;
    }

    .review-item-due-label {
      font-size: 0.7rem;
      color: #0d9488;
    }

    .review-delivery-section {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid #e3e8ee;
    }

    .review-delivery-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 0.75rem;
    }

    .review-delivery-options {
      display: flex;
      gap: 0.75rem;
    }

    .review-delivery-option {
      flex: 1;
      cursor: pointer;
    }

    .review-delivery-option input {
      display: none;
    }

    .review-option-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      border: 2px solid #e3e8ee;
      border-radius: 10px;
      transition: all 0.15s;
    }

    .review-delivery-option input:checked + .review-option-content {
      border-color: #1a1a1a;
      background: #fafafa;
    }

    .review-option-label {
      font-weight: 600;
      font-size: 0.9rem;
      color: #1a1a1a;
    }

    .review-option-price {
      font-size: 0.8rem;
      color: #697386;
      margin-top: 0.2rem;
    }

    .review-totals {
      padding: 1rem 1.5rem;
      background: #f6f8fa;
    }

    .review-total-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: #3c4257;
      padding: 0.3rem 0;
    }

    .review-total-row.final {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a1a1a;
      padding-top: 0.6rem;
      margin-top: 0.4rem;
      border-top: 1px solid #e3e8ee;
    }

    .review-next-btn {
      margin: 1.25rem 1.5rem;
      padding: 0.85rem;
      border-radius: 10px;
      border: none;
      background: #1a1a1a;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
    }

    .review-next-btn:hover { background: #333; }

    /* ===================== CUSTOMER INFO FORM ===================== */

    .customer-form-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .customer-form-container {
      background: #fff;
      border-radius: 16px;
      max-width: 800px;
      width: 95%;
      max-height: 90vh;
      display: flex;
      overflow: hidden;
    }

    .customer-form-sidebar {
      width: 240px;
      background: #f6f8fa;
      padding: 1.5rem 0;
      border-right: 1px solid #e3e8ee;
      flex-shrink: 0;
    }

    .customer-form-sidebar-title {
      font-size: 0.72rem;
      font-weight: 600;
      color: #697386;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0 1.25rem;
      margin-bottom: 1rem;
    }

    .customer-form-step {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 1.25rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .customer-form-step:hover {
      background: rgba(0, 0, 0, 0.03);
    }

    .customer-form-step.active {
      background: #fff;
      border-left: 3px solid #1a1a1a;
      padding-left: calc(1.25rem - 3px);
    }

    .customer-form-step.completed {
      cursor: pointer;
    }

    .customer-form-step.pending {
      opacity: 0.5;
      cursor: default;
    }

    .customer-form-step-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      flex-shrink: 0;

    .customer-form-step.pending .customer-form-step-icon {

      color: #697386;

    .customer-form-step.active .customer-form-step-icon {

      color: #fff;
    }

    .customer-form-step.completed .customer-form-step-icon {
      background: #0d9488;
      color: #fff;
    }

    .customer-form-step-label {
      font-size: 0.88rem;
      color: #3c4257;
    }

    .customer-form-step.active .customer-form-step-label {
      font-weight: 600;
      color: #0a2540;
    }

    .customer-form-step.completed .customer-form-step-label {
      color: #0d9488;
    }

    .customer-form-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .customer-form-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid #e3e8ee;
    }

    .customer-form-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    .customer-form-close {
      width: 32px;
      height: 32px;
      border: none;
      background: #f6f8fa;
      border-radius: 50%;
      font-size: 1.25rem;
      color: #697386;
      cursor: pointer;
    }

    .customer-form-close:hover {
      background: #e3e8ee;
    }

    .customer-form-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .customer-form-section-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #0a2540;
      margin-bottom: 0.5rem;
    }

    .customer-form-section-desc {
      font-size: 0.85rem;
      color: #697386;
      margin-bottom: 1.5rem;
    }

    .customer-form-row {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .customer-form-field {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .customer-form-field.half {
      flex: 0 0 calc(50% - 0.5rem);
    }

    .customer-form-field label {
      font-size: 0.82rem;
      font-weight: 500;
      color: #3c4257;
      margin-bottom: 0.4rem;
    }

    .customer-form-field label .required {
      color: #df1b41;
    }

    .customer-form-field input,
    .customer-form-field select {
      padding: 0.7rem 0.85rem;
      border: 1px solid #d3d8de;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .customer-form-field input:focus,
    .customer-form-field select:focus {
      border-color: #1a1a1a;
      box-shadow: 0 0 0 3px rgba(26, 26, 26, 0.1);
    }

    .customer-form-field input.error,
    .customer-form-field select.error {
      border-color: #df1b41;
    }

    .customer-form-field .field-error {
      font-size: 0.75rem;
      color: #df1b41;
      margin-top: 0.3rem;
    }

    .customer-form-field .field-hint {
      font-size: 0.75rem;
      color: #697386;
      margin-top: 0.3rem;
    }

    .customer-form-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.25rem 1.5rem;
      border-top: 1px solid #e3e8ee;
      background: #f6f8fa;
    }

    .customer-form-back {
      font-size: 0.88rem;
      color: #697386;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
    }

    .customer-form-back:hover {
      color: #3c4257;
    }

    .customer-form-continue {
      padding: 0.75rem 2rem;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }

    .customer-form-continue:hover {
      background: #333;
    }

    .customer-form-continue:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .customer-form-divider {
      height: 1px;
      background: #e3e8ee;
      margin: 1.5rem 0;
    }

    .customer-form-review-section {
      background: #f6f8fa;
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }

    .customer-form-review-title {
      font-size: 0.72rem;
      font-weight: 600;
      color: #697386;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .customer-form-review-edit {
      font-size: 0.78rem;
      color: #1a1a1a;
      background: none;
      border: none;
      cursor: pointer;
      text-transform: none;
      letter-spacing: normal;
      font-weight: 500;
    }

    .customer-form-review-edit:hover {
      text-decoration: underline;
    }

    .customer-form-review-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
      padding: 0.25rem 0;
    }

    .customer-form-review-label {
      color: #697386;
    }

    .customer-form-review-value {
      color: #0a2540;
      font-weight: 500;
    }

    .customer-form-terms {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      margin-top: 1.5rem;
      padding: 1rem;
      background: #fff;
      border: 1px solid #e3e8ee;
      border-radius: 8px;
    }

    .customer-form-terms input[type="checkbox"] {
      width: 20px;
      height: 20px;
      margin-top: 0.1rem;
      accent-color: #1a1a1a;
      cursor: pointer;
    }

    .customer-form-terms-text {
      font-size: 0.85rem;
      color: #3c4257;
      line-height: 1.5;
    }

    /* ===================== PRODUCT DETAIL MODAL ===================== */

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.4);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .modal-backdrop.open {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: #fff;
      border-radius: 24px;
      width: 85%;
      max-width: 1100px;
      max-height: 85vh;
      display: flex;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.2);
      transform: scale(0.95) translateY(20px);
      transition: transform 0.35s ease;
    }

    .modal-backdrop.open .modal {
      transform: scale(1) translateY(0);
    }

    .modal-image {
      flex: 1;
      background: #f8f6f3;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      min-height: 400px;
    }

    .modal-image img {
      max-width: 100%;
      max-height: 60vh;
      object-fit: contain;
    }

    .modal-details {
      flex: 1;
      padding: 2rem 2.5rem;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .modal-top-bar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 0.8rem;
      flex-shrink: 0;
    }

    .modal-close {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1.2rem;
      border-radius: 100px;
      border: 1.5px solid rgba(0,0,0,0.1);
      background: transparent;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: #444;
      cursor: pointer;
      transition: background 0.2s;
      touch-action: manipulation;
      height: 44px;
    }

    .modal-close:active { background: rgba(0,0,0,0.05); }

    .modal-close svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .modal-category {
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(0, 0, 0, 0.35);
      margin-bottom: 0.4rem;
    }

    .modal-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 2rem;
      color: #1a1a1a;
      line-height: 1.25;
      margin-bottom: 0.5rem;
    }

    .modal-price {
      font-size: 1.4rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 1rem;
    }

    .modal-divider {
      width: 100%;
      height: 1px;
      background: rgba(0,0,0,0.08);
      margin-bottom: 1rem;
    }

    .modal-desc {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #555;
      font-weight: 300;
      margin-bottom: 1rem;
    }

    .modal-specs {
      list-style: none;
      margin-bottom: 1.2rem;
    }

    .modal-specs li {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      font-size: 0.85rem;
    }

    .modal-specs li span:first-child {
      color: rgba(0, 0, 0, 0.4);
      font-weight: 400;
    }

    .modal-specs li span:last-child {
      color: #1a1a1a;
      font-weight: 500;
    }

    .modal-badge {
      display: inline-block;
      padding: 0.4rem 1rem;
      background: #eef7ee;
      color: #2d7a2d;
      font-size: 0.8rem;
      font-weight: 500;
      border-radius: 8px;
      align-self: flex-start;
      margin-bottom: 1.2rem;
    }

    .modal-badge.in-stock {
      background: #eef7ee;
      color: #2d7a2d;
    }

    .modal-badge.ships {
      background: #fef3c7;
      color: #b45309;
    }

    .add-to-order-btn {
      width: 100%;
      padding: 0.9rem;
      border-radius: 12px;
      border: none;
      background: #1a1a1a;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.2s;
      letter-spacing: 0.04em;
      margin-top: auto;
      flex-shrink: 0;
    }

    .add-to-order-btn:active {
      background: #333;
    }

    /* ===================== MODAL TRANSITIONS ===================== */

    .modal-details-inner {
      display: flex;
      flex-direction: column;
      height: 100%;
      animation: modalSlideIn 0.35s ease forwards;
    }

    @keyframes modalSlideIn {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes modalSlideOut {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 0; transform: translateX(-40px); }
    }

    /* ===================== PRICING VIEW ===================== */

    .pricing-view {
      display: flex;
      flex-direction: column;
      height: 100%;
      animation: modalSlideIn 0.35s ease forwards;
    }

    .pricing-header {
      margin-bottom: 0.3rem;
      flex-shrink: 0;
    }

    .pricing-product-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 600;
      font-size: 1.5rem;
      color: #1a1a1a;
      line-height: 1.25;
      margin-bottom: 0.25rem;
    }

    .pricing-subtitle {
      font-size: 0.85rem;
      color: #888;
      font-weight: 400;
    }

    .pricing-cards {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      margin: 1rem 0;
      overflow-y: auto;
    }

    .pricing-card {
      border: 1.5px solid rgba(0, 0, 0, 0.08);
      border-radius: 16px;
      padding: 1.1rem 1.3rem;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
    }

    .pricing-card:active {
      transform: scale(0.98);
    }

    .pricing-card:hover {
      border-color: rgba(0, 0, 0, 0.2);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
    }

    .pricing-card.best-value {
      border-color: #1a1a1a;
      background: #fafaf8;
    }

    .pricing-card.selected {
      border-color: #1a1a1a;
      background: #1a1a1a;
    }

    .pricing-card.selected .pricing-card-label,
    .pricing-card.selected .pricing-card-amount {
      color: #fff;
    }

    .pricing-card.selected .pricing-card-detail,
    .pricing-card.selected .pricing-card-period {
      color: rgba(255, 255, 255, 0.6);
    }

    .pricing-card.selected .pricing-card-down {
      color: rgba(255, 255, 255, 0.8);
    }

    .pricing-card.selected .pricing-card-badge {
      background: #fff;
      color: #1a1a1a;
    }

    .add-to-order-btn.disabled {
      opacity: 0.35;
      pointer-events: none;
    }

    .pricing-card-left {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .pricing-card-label {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      color: #1a1a1a;
    }

    .pricing-card-detail {
      font-size: 0.78rem;
      color: #888;
      font-weight: 400;
    }

    .pricing-card-badge {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: #1a1a1a;
      color: #fff;
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
      margin-top: 0.3rem;
      display: inline-block;
      align-self: flex-start;
    }

    .pricing-card-right {
      text-align: right;
      flex-shrink: 0;
    }

    .pricing-card-amount {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: #1a1a1a;
      line-height: 1.1;
    }

    .pricing-card-period {
      font-size: 0.72rem;
      color: #888;
      font-weight: 400;
    }

    .pricing-card-down {
      font-size: 0.68rem;
      color: #1a1a1a;
      font-weight: 600;
      margin-top: 0.25rem;
    }

    .pricing-back-btn {
      width: 100%;
      padding: 0.8rem;
      border-radius: 12px;
      border: 1.5px solid rgba(0, 0, 0, 0.12);
      background: transparent;
      color: #444;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.2s;
      flex-shrink: 0;
      margin-top: auto;
    }

    .pricing-back-btn:active {
      background: rgba(0, 0, 0, 0.04);
    }

    /* ===================== PIN SCREEN ===================== */

    #pinScreen {
      position: fixed;
      inset: 0;
      background: #1a1a1a;
      z-index: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    #pinScreen.visible {
      opacity: 1;
      visibility: visible;
    }

    .pin-back-btn {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      background: transparent;
      border: 1.5px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.6);
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.5rem 1.2rem;
      border-radius: 100px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .pin-back-btn:active { background: rgba(255,255,255,0.05); }

    .pin-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 2.2rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 0.4rem;
    }

    .pin-subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 2rem;
    }

    .pin-dots {
      display: flex;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .pin-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.3);
      background: transparent;
      transition: all 0.15s ease;
    }

    .pin-dot.filled {
      background: #fff;
      border-color: #fff;
    }

    .pin-dots.shake {
      animation: pinShake 0.4s ease;
    }

    .pin-dots.shake .pin-dot.filled {
      background: #e74c3c;
      border-color: #e74c3c;
    }

    @keyframes pinShake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-12px); }
      40% { transform: translateX(12px); }
      60% { transform: translateX(-8px); }
      80% { transform: translateX(8px); }
    }

    .pin-keypad {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      gap: 0.8rem;
    }

    .pin-key {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: transparent;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 1.6rem;
      font-weight: 500;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pin-key:active {
      background: rgba(255,255,255,0.1);
      transform: scale(0.95);
    }

    .pin-key.fn {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.5);
      border-color: transparent;
    }

    .pin-key.fn:active {
      color: #fff;
    }

    const sbPublic = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const sbAdmin = supabase.createClient(SUPABASE_URL, SUPABASE_SERVICE_KEY);

    // =================== SPLASH SCREEN IMAGES (hardcoded for instant display) ===================
    const splashImageFiles = [
      'PRODUCT PHOTOS/ChatGPT Image Mar 30, 2026, 09_35_18 PM.png',

      'PRODUCT PHOTOS/d9b5b4af-53b5-405a-bbed-06078f3f1f7d.png'
    ];

    // =================== PRODUCTS DATA (loaded from Supabase) ===================
    let products = [];
    let categories = ['All'];
    let activeCategory = 'All';
    let dataLoaded = false;

    async function loadProducts() {
      const { data, error } = await sbPublic.from('products').select('*').order('id');
      if (error) {
        console.error('Error loading products:', error);
        return;
      }
      products = data.map(p => ({
        ...p,
        image: p.image_url,
        specs: p.specs || [],
        categories: p.categories || []
      }));
      const allCats = products.flatMap(p => {
        if (Array.isArray(p.categories) && p.categories.length > 0) return p.categories;
        return [p.category];
      });
      const uniqueCats = [...new Set(allCats)].filter(Boolean);
      categories = ['All', ...uniqueCats];
      dataLoaded = true;
    }

    function formatPrice(n) {
      return '$' + n.toLocaleString('en-US');
    }

    const plans = [
      { key: 'now',  label: 'Buy Now',       markup: 2.0,  months: 0  },
      { key: '1yr',  label: '12-Month Plan',  markup: 2.5,  months: 12 },
      { key: '2yr',  label: '24-Month Plan',  markup: 3.0,  months: 24 },
      { key: '3yr',  label: '36-Month Plan',  markup: 3.5,  months: 36 }
    ];

    function getPlanPrice(cost, plan) {
      const total = Math.round(cost * plan.markup);
      if (plan.months === 0) return { total, monthly: null, downPayment: total };
      const downPayment = Math.round(total * 0.10);
      const remaining = total - downPayment;
      return { total, monthly: Math.round(remaining / plan.months), downPayment };
    }

    function getLowestMonthly(cost) {
      const longest = plans[plans.length - 1];
      return getPlanPrice(cost, longest).monthly;
    }

    // =================== ORDER STATE ===================

    let orderItems = [];
    let sidebarOpen = false;

    function addToOrder(product, plan) {
      const pricing = getPlanPrice(product.cost, plan);
      const downPayment = pricing.downPayment;
      const displayPrice = plan.months === 0 ? pricing.total : pricing.monthly;
      const planLabel = plan.months === 0
        ? formatPrice(pricing.total) + ' total'
        : formatPrice(pricing.monthly) + '/mo \u00d7 ' + plan.months;
      const itemKey = product.id + '-' + plan.key;

      const existing = orderItems.find(item => item.itemKey === itemKey);
      if (existing) {
        existing.quantity++;
      } else {
        orderItems.push({ product, plan, itemKey, displayPrice, downPayment, planLabel, quantity: 1 });
      }
      if (!sidebarOpen) toggleSidebar(true);
      renderOrder();
    }

    function removeFromOrder(itemKey) {
      orderItems = orderItems.filter(item => item.itemKey !== itemKey);
      renderOrder();
      if (orderItems.length === 0) toggleSidebar(false);
    }

    function updateQuantity(itemKey, delta) {
      const item = orderItems.find(item => item.itemKey === itemKey);
      if (!item) return;
      item.quantity += delta;
      if (item.quantity <= 0) {
        removeFromOrder(itemKey);
        return;
      }
      renderOrder();
    }

    function clearOrder() {
      orderItems = [];
      renderOrder();
      toggleSidebar(false);
    }

    function getDueToday() {
      return orderItems.reduce((sum, item) => sum + item.downPayment * item.quantity, 0);
    }

    function getTotalItems() {
      return orderItems.reduce((sum, item) => sum + item.quantity, 0);
    }

    function renderOrder() {
      const container = document.getElementById('orderItems');
      const countEl = document.getElementById('orderItemCount');
      const subtotalEl = document.getElementById('orderSubtotal');
      const total = getTotalItems();

      countEl.textContent = total + ' item' + (total !== 1 ? 's' : '');
      subtotalEl.textContent = formatPrice(getDueToday());

      if (orderItems.length === 0) {
        container.innerHTML = '<div class="order-empty">No items added yet</div>';
        return;
      }

      container.innerHTML = orderItems.map(item => {
        const isBuyNow = item.plan.months === 0;
        return `
        <div class="order-item">
          <img class="order-item-img" src="${encodeURI(item.product.image)}" alt="${item.product.name}">
          <div class="order-item-details">
            <div class="order-item-name">${item.product.name}</div>
            <div class="order-item-price">${item.planLabel}</div>
            <div class="order-item-down">${isBuyNow ? 'Paid in full' : formatPrice(item.downPayment) + ' down today'}</div>
          </div>
          <div class="order-item-qty">
            <button class="qty-btn" data-key="${item.itemKey}" data-delta="-1">&minus;</button>
            <span class="qty-val">${item.quantity}</span>
            <button class="qty-btn" data-key="${item.itemKey}" data-delta="1">+</button>
          </div>
          <button class="order-item-remove" data-key="${item.itemKey}">&times;</button>
        </div>
      `}).join('');

      container.querySelectorAll('.qty-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          updateQuantity(btn.dataset.key, Number(btn.dataset.delta));
        });
      });

      container.querySelectorAll('.order-item-remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          removeFromOrder(btn.dataset.key);
        });
      });
    }

    // =================== SIDEBAR TOGGLE ===================

    const orderSidebar = document.getElementById('orderSidebar');

    function toggleSidebar(open) {
      sidebarOpen = (open !== undefined) ? open : !sidebarOpen;
      if (sidebarOpen) {
        orderSidebar.classList.add('open');
      } else {
        orderSidebar.classList.remove('open');
      }
    }

    document.getElementById('orderConfirmBtn').addEventListener('click', () => {
      if (orderItems.length === 0) return;
      showOrderReview();
    });

    function showOrderReview() {
      const baseTotal = getDueToday();
      let deliverySelected = false;

      const itemsHTML = orderItems.map(item => {
        const isBuyNow = item.plan.months === 0;
        const itemTotal = item.downPayment * item.quantity;
        return `
          <div class="review-item">
            <img class="review-item-img" src="${encodeURI(item.product.image)}" alt="${item.product.name}">
            <div class="review-item-details">
              <div class="review-item-name">${item.product.name}</div>
              <div class="review-item-plan">${item.planLabel}${item.quantity > 1 ? ' × ' + item.quantity : ''}</div>
            </div>
            <div class="review-item-due">
              <div class="review-item-amount">${formatPrice(itemTotal)}</div>
              <div class="review-item-due-label">${isBuyNow ? 'due today' : 'down today'}</div>
            </div>
          </div>
        `;
      }).join('');

      const overlay = document.createElement('div');
      overlay.className = 'order-confirm-overlay';
      overlay.innerHTML = `
        <div class="order-review-box">
          <div class="review-header">
            <div class="review-title">Order Summary</div>
            <button class="review-close" id="reviewClose">&times;</button>
          </div>
          <div class="review-items">${itemsHTML}</div>
          <div class="review-delivery-section">
            <div class="review-delivery-title">How would you like to receive your order?</div>
            <div class="review-delivery-options">
              <label class="review-delivery-option">
                <input type="radio" name="deliveryMethod" value="pickup" checked>
                <div class="review-option-content">
                  <span class="review-option-label">Store Pickup</span>
                  <span class="review-option-price">Free</span>
                </div>
              </label>
              <label class="review-delivery-option">
                <input type="radio" name="deliveryMethod" value="delivery">
                <div class="review-option-content">
                  <span class="review-option-label">Delivery</span>
                  <span class="review-option-price">+$50</span>
                </div>
              </label>
            </div>
          </div>
          <div class="review-totals">
            <div class="review-total-row">
              <span>Subtotal</span>
              <span id="reviewSubtotal">${formatPrice(baseTotal)}</span>
            </div>
            <div class="review-total-row" id="reviewDeliveryRow" style="display:none">
              <span>Delivery</span>
              <span>$50</span>
            </div>
            <div class="review-total-row final">
              <span>Due Today</span>
              <span id="reviewTotal">${formatPrice(baseTotal)}</span>
            </div>
          </div>
          <button class="review-next-btn" id="reviewNextBtn">Next</button>
        </div>
      `;
      document.body.appendChild(overlay);

      document.getElementById('reviewClose').addEventListener('click', () => overlay.remove());

      document.querySelectorAll('input[name="deliveryMethod"]').forEach(radio => {
        radio.addEventListener('change', () => {
          deliverySelected = radio.value === 'delivery';
          document.getElementById('reviewDeliveryRow').style.display = deliverySelected ? 'flex' : 'none';
          document.getElementById('reviewTotal').textContent = formatPrice(baseTotal + (deliverySelected ? 50 : 0));
        });
      });

      document.getElementById('reviewNextBtn').addEventListener('click', () => {
        overlay.remove();
        showCustomerInfoForm(deliverySelected);
      });
    }

    // =================== CUSTOMER INFO FORM ===================

    const US_STATES = [
      'AL','AK','AZ','AR','CA','CO','CT','DE','FL','GA','HI','ID','IL','IN','IA','KS','KY','LA','ME','MD',
      'MA','MI','MN','MS','MO','MT','NE','NV','NH','NJ','NM','NY','NC','ND','OH','OK','OR','PA','RI','SC',
      'SD','TN','TX','UT','VT','VA','WA','WV','WI','WY','DC'
    ];

    const formSections = [
      { id: 'personal', label: 'Personal Info', icon: '1' },
      { id: 'address', label: 'Address', icon: '2' },
      { id: 'identification', label: 'ID Info', icon: '3' },
      { id: 'employment', label: 'Employment', icon: '4' },
      { id: 'references', label: 'References', icon: '5' },
      { id: 'review', label: 'Review', icon: '6' }
    ];

    let customerFormData = {};
    let currentFormSection = 0;
    let deliveryForForm = false;

    function showCustomerInfoForm(deliverySelected) {
      deliveryForForm = deliverySelected;
      customerFormData = {};
      currentFormSection = 0;

      const overlay = document.createElement('div');
      overlay.className = 'customer-form-overlay';
      overlay.id = 'customerFormOverlay';

          <div class="customer-form-sidebar">
            <div class="customer-form-sidebar-title">Complete Your Application</div>
            <div id="formSteps"></div>

              <button class="customer-form-close" id="customerFormClose">&times;</button>
            </div>
            <div class="customer-form-body" id="formBody"></div>
            <div class="customer-form-actions">
              <button class="customer-form-back" id="formBack" style="visibility:hidden">&larr; Back</button>
              <button class="customer-form-continue" id="formContinue">Continue</button>
            </div>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      renderFormSteps();
      renderFormSection();

      document.getElementById('customerFormClose').addEventListener('click', () => {
        if (confirm('Are you sure you want to cancel? Your information will not be saved.')) {
          overlay.remove();
        }
      });

      document.getElementById('formBack').addEventListener('click', () => {
        if (currentFormSection > 0) {
          currentFormSection--;
          renderFormSteps();
          renderFormSection();
        }
      });

      document.getElementById('formContinue').addEventListener('click', async () => {
        if (validateCurrentSection()) {
          saveCurrentSection();
          if (currentFormSection < formSections.length - 1) {
            currentFormSection++;
            renderFormSteps();
            renderFormSection();

    function renderFormSteps() {
      const container = document.getElementById('formSteps');
      container.innerHTML = formSections.map((section, idx) => {
        let status = 'pending';
        if (idx < currentFormSection) status = 'completed';
        else if (idx === currentFormSection) status = 'active';

        const icon = status === 'completed' ? '✓' : section.icon;

        return `
          <div class="customer-form-step ${status}" data-step="${idx}">
            <div class="customer-form-step-icon">${icon}</div>
            <div class="customer-form-step-label">${section.label}</div>
          </div>
        `;
      }).join('');

      container.querySelectorAll('.customer-form-step.completed').forEach(step => {
        step.addEventListener('click', () => {
          currentFormSection = Number(step.dataset.step);
          renderFormSteps();
          renderFormSection();
        });
      });
    }

    function renderFormSection() {
      const backBtn = document.getElementById('formBack');
      const continueBtn = document.getElementById('formContinue');
      const titleEl = document.getElementById('formSectionTitle');

      backBtn.style.visibility = currentFormSection === 0 ? 'hidden' : 'visible';
      continueBtn.textContent = currentFormSection === formSections.length - 1 ? 'Submit Application' : 'Continue';

      const section = formSections[currentFormSection];
      titleEl.textContent = getSectionTitle(section.id);

      switch (section.id) {
        case 'personal': renderPersonalSection(); break;
        case 'address': renderAddressSection(); break;
        case 'identification': renderIdSection(); break;
        case 'employment': renderEmploymentSection(); break;
        case 'references': renderReferencesSection(); break;
        case 'review': renderReviewSection(); break;
      }
    }

        identification: 'Identification',

      return titles[sectionId] || '';

    function getMaxDOB() {
      const d = new Date();
      d.setFullYear(d.getFullYear() - 18);
      return d.toISOString().split('T')[0];
    }

    function formatDOB(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    }

    function formatIdType(type) {
      const types = { drivers_license: "Driver's License", state_id: 'State ID', passport: 'Passport', military_id: 'Military ID' };
      return types[type] || type || '';
    }

    function maskIdNumber(num) {
      if (!num || num.length < 4) return num || '';
      return '***' + num.slice(-4);
    }

    function formatEmpStatus(status) {
      const statuses = { employed: 'Employed', self_employed: 'Self-Employed', retired: 'Retired', student: 'Student', unemployed: 'Unemployed', other: 'Other' };
      return statuses[status] || status || '';
    }

    function formatIncomeRange(range) {
      if (!range) return '';
      if (range === '5000+') return '$5,000+';
      const parts = range.split('-');
      return '$' + Number(parts[0]).toLocaleString() + ' - $' + Number(parts[1]).toLocaleString();
    }

    function validateCurrentSection() {
      const section = formSections[currentFormSection].id;
      let valid = true;
      let firstError = null;

      const markError = (id) => {
        const el = document.getElementById(id);
        if (el) {
          el.classList.add('error');
          if (!firstError) firstError = el;
        }
        valid = false;
      };

      const clearErrors = () => {
        document.querySelectorAll('.customer-form-field input, .customer-form-field select').forEach(el => {
          el.classList.remove('error');
        });
      };

      clearErrors();

      switch (section) {
        case 'personal':
          if (!document.getElementById('cf_firstName').value.trim()) markError('cf_firstName');
          if (!document.getElementById('cf_lastName').value.trim()) markError('cf_lastName');
          if (!document.getElementById('cf_dob').value) markError('cf_dob');
          if (!document.getElementById('cf_phone').value.trim()) markError('cf_phone');
          if (!document.getElementById('cf_email').value.trim()) markError('cf_email');
          break;

        case 'address':
          if (!document.getElementById('cf_street').value.trim()) markError('cf_street');
          if (!document.getElementById('cf_city').value.trim()) markError('cf_city');
          if (!document.getElementById('cf_state').value) markError('cf_state');
          if (!document.getElementById('cf_zip').value.trim()) markError('cf_zip');
          break;

        case 'identification':
          if (!document.getElementById('cf_idType').value) markError('cf_idType');
          if (!document.getElementById('cf_idNumber').value.trim()) markError('cf_idNumber');
          if (!document.getElementById('cf_idState').value) markError('cf_idState');
          break;

        case 'employment':
          if (!document.getElementById('cf_empStatus').value) markError('cf_empStatus');
          const empStatus = document.getElementById('cf_empStatus').value;
          if ((empStatus === 'employed' || empStatus === 'self_employed') && !document.getElementById('cf_employer').value.trim()) {
            markError('cf_employer');
          }
          if (!document.getElementById('cf_income').value) markError('cf_income');
          if (!document.getElementById('cf_payFreq').value) markError('cf_payFreq');
          break;

        case 'references':
          if (!document.getElementById('cf_ref1Name').value.trim()) markError('cf_ref1Name');
          if (!document.getElementById('cf_ref1Phone').value.trim()) markError('cf_ref1Phone');
          if (!document.getElementById('cf_ref1Rel').value) markError('cf_ref1Rel');
          break;

        case 'review':
          const termsChecked = document.getElementById('cf_terms').checked;
          if (!termsChecked) {
            alert('Please agree to the terms and conditions.');
            valid = false;
          }
          break;
      }

      if (firstError) firstError.focus();
      return valid;
    }

      switch (section) {

              relationship: document.getElementById('cf_ref1Rel').value

          ];
          const ref2Name = document.getElementById('cf_ref2Name').value.trim();
          if (ref2Name) {
            customerFormData.references.push({
              name: ref2Name,
              phone: document.getElementById('cf_ref2Phone').value.trim(),
              relationship: document.getElementById('cf_ref2Rel').value
            });
          }
          break;
      }
    }

    async function submitFullOrder() {
      const btn = document.getElementById('formContinue');
      btn.disabled = true;
      btn.textContent = 'Processing...';

      try {
        const orderNumber = await submitOrder(deliveryForForm, customerFormData);
        document.getElementById('customerFormOverlay').remove();
        showOrderConfirmed(deliveryForForm, orderNumber);
      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Submit Application';
        alert('Error submitting order: ' + err.message);
      }
    }

    function generateOrderNumber() {
      const timestamp = Date.now().toString(36).toUpperCase();
      const random = Math.random().toString(36).substring(2, 6).toUpperCase();
      return 'FH-' + timestamp + random;
    }

    async function submitOrder(withDelivery, customerInfo = null) {
      const orderNumber = generateOrderNumber();
      const subtotal = getDueToday();
      const deliveryFee = withDelivery ? 50 : 0;
      const totalDueToday = subtotal + deliveryFee;

      const orderData = {
        order_number: orderNumber,
        items: orderItems.map(item => ({
          product_id: item.product.id,
          product_name: item.product.name,
          plan_key: item.plan.key,
          plan_label: item.planLabel,
          plan_months: item.plan.months,
          quantity: item.quantity,
          down_payment: item.downPayment,
          total_down: item.downPayment * item.quantity,
          monthly_payment: item.plan.months > 0 ? item.displayPrice : null,
          full_price: item.plan.months === 0 ? item.displayPrice : null
        })),
        delivery_method: withDelivery ? 'delivery' : 'pickup',
        delivery_fee: deliveryFee,
        subtotal: subtotal,
        total_due_today: totalDueToday,
        status: 'pending',
        customer_info: customerInfo,
        created_at: new Date().toISOString()
      };

    let pinEntry = '';

    function showPinScreen() {
      pinEntry = '';
      updatePinDots();

    }

    function hidePinScreen() {
      pinScreen.classList.remove('visible');
      pinEntry = '';
      updatePinDots();
    }

    function updatePinDots() {
      const dots = pinDotsEl.querySelectorAll('.pin-dot');
      dots.forEach((dot, i) => {
        dot.classList.toggle('filled', i < pinEntry.length);
      });
    }

    document.getElementById('pinKeypad').addEventListener('click', (e) => {
      const key = e.target.closest('.pin-key');
      if (!key) return;
      const val = key.dataset.val;

      if (val === 'clear') {
        pinEntry = '';
        updatePinDots();
        return;
      }
      if (val === 'back') {
        pinEntry = pinEntry.slice(0, -1);
        updatePinDots();
        return;
      }
      if (pinEntry.length >= 6) return;

      pinEntry += val;
      updatePinDots();

      if (pinEntry.length === 6) {
        if (pinEntry === CORRECT_PIN) {
          setTimeout(() => {
            hidePinScreen();
            showAdminScreen();
          }, 300);
        } else {
          pinDotsEl.classList.add('shake');
          setTimeout(() => {
            pinDotsEl.classList.remove('shake');
            pinEntry = '';
            updatePinDots();
          }, 500);

    function getTimeAgo(date) {
      const now = new Date();
      const seconds = Math.floor((now - date) / 1000);
      
      if (seconds < 60) return 'Just now';
      if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
      if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
      if (seconds < 604800) return Math.floor(seconds / 86400) + 'd ago';
      
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: date.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
    }

      const emp = c.employment || {};

              <div class="order-detail-customer-value">
                ${addr.street || ''}${addr.unit ? ', ' + addr.unit : ''}<br>

    async function loadTerminalReaders() {
      const select = document.getElementById('terminalReaderSelect');
      select.innerHTML = '<option value="">Loading...</option>';

      try {
        const response = await fetch('/api/terminal/readers');
        const data = await response.json();

        if (data.error) {
          select.innerHTML = '<option value="">Error loading readers</option>';
          return;
        }

        if (data.readers.length === 0) {
          select.innerHTML = '<option value="">No readers found</option>';
        } else {
          select.innerHTML = '<option value="">Select a reader...</option>' +
            data.readers.map(r => `<option value="${r.id}" ${r.id === terminalReaderId ? 'selected' : ''}>${r.label || r.id} (${r.status})</option>`).join('');
          
          if (terminalReaderId) {
            checkReaderStatus(terminalReaderId);
          }
        }
      } catch (err) {
        select.innerHTML = '<option value="">Server not running</option>';
        updateReaderStatusDisplay('offline', 'Server offline - run npm start');
      }
    }

    async function checkReaderStatus(readerId) {
      try {
        const response = await fetch(`/api/terminal/reader/${readerId}`);
        const data = await response.json();

        if (data.error) {
          updateReaderStatusDisplay('error', data.error);
        } else {
          updateReaderStatusDisplay(data.status, `${data.label || data.id} - ${data.status}`);
        }
      } catch (err) {
        updateReaderStatusDisplay('offline', 'Could not check reader');
      }
    }

    function updateReaderStatusDisplay(status, text) {
      const el = document.getElementById('readerStatus');
      const isOnline = status === 'online';
      el.innerHTML = `
        <span style="width:10px;height:10px;border-radius:50%;background:${isOnline ? '#0d9488' : '#d1d5db'}"></span>
        <span style="color:${isOnline ? '#0d9488' : '#697386'}">${text}</span>
      `;
    }

    function showTerminalMessage(msg, type) {
      const el = document.getElementById('terminalMessage');
      el.style.display = 'block';
      el.style.background = type === 'success' ? '#ecfdf5' : type === 'error' ? '#fef2f2' : '#f0f9ff';
      el.style.color = type === 'success' ? '#065f46' : type === 'error' ? '#991b1b' : '#0c4a6e';
      el.style.border = `1px solid ${type === 'success' ? '#6ee7b7' : type === 'error' ? '#fca5a5' : '#7dd3fc'}`;
      el.textContent = msg;
    }

    async function sendPaymentToTerminal(amount, readerId) {
      const btn = document.getElementById('sendToTerminal');
      const cancelBtn = document.getElementById('cancelPayment');
      btn.disabled = true;
      btn.textContent = 'Sending...';
      showTerminalMessage('Creating payment...', 'info');

      try {
        const amountCents = Math.round(amount * 100);
        
        const response = await fetch('/api/terminal/create-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            amount: amountCents,
            reader_id: readerId
          })
        });

        const result = await response.json();

        if (result.error) {
          showTerminalMessage('Error: ' + result.error, 'error');
          btn.disabled = false;
          btn.textContent = 'Send to Terminal';
        } else {
          showTerminalMessage(`✓ $${amount.toFixed(2)} sent to terminal! Waiting for customer to tap/insert card...`, 'success');
          cancelBtn.style.display = 'block';
          btn.textContent = 'Payment Pending...';
        }

      } catch (err) {
        showTerminalMessage('Error: ' + err.message + '. Make sure server is running (npm start)', 'error');
        btn.disabled = false;
        btn.textContent = 'Send to Terminal';
      }
    }

    async function cancelTerminalPayment(readerId) {
      const btn = document.getElementById('sendToTerminal');
      const cancelBtn = document.getElementById('cancelPayment');

      try {
        const response = await fetch('/api/terminal/cancel-payment', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ reader_id: readerId })
        });

        const result = await response.json();

        if (result.error) {
          showTerminalMessage('Cancel error: ' + result.error, 'error');
        } else {
          showTerminalMessage('Payment cancelled.', 'info');
        }

      } catch (err) {
        showTerminalMessage('Error cancelling: ' + err.message, 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send to Terminal';
        cancelBtn.style.display = 'none';
      }
    }

      function calculatePrices() {
        const cost = Number(document.getElementById('calcCostInput').value);
        if (!cost || cost <= 0) {
          document.getElementById('calcResults').innerHTML = '<div class="calc-error">Please enter a valid cost amount</div>';
          return;
        }

        const calcPlans = [
          { key: 'now', label: 'Buy Now', markup: 2.0, months: 0 },
          { key: '1yr', label: '12-Month Plan', markup: 2.5, months: 12 },
          { key: '2yr', label: '24-Month Plan', markup: 3.0, months: 24 },
          { key: '3yr', label: '36-Month Plan', markup: 3.5, months: 36 }
        ];

        let resultsHTML = '<div class="calc-results-grid">';

        calcPlans.forEach(plan => {
          const total = Math.round(cost * plan.markup);
          const isBuyNow = plan.months === 0;
          const downPayment = isBuyNow ? total : Math.round(total * 0.10);
          const remaining = isBuyNow ? 0 : total - downPayment;
          const monthly = isBuyNow ? null : Math.round(remaining / plan.months);
          const weekly = isBuyNow ? null : Math.round(monthly / 4.33);

          resultsHTML += `
            <div class="calc-result-card ${isBuyNow ? 'buy-now' : ''}">
              <div class="calc-result-label">${plan.label}</div>
              <div class="calc-essentials">
                ${isBuyNow ? `
                  <div class="calc-essential-item full">
                    <div class="calc-essential-value">${formatPrice(total)}</div>
                    <div class="calc-essential-label">Total Due Today</div>
                  </div>
                ` : `
                  <div class="calc-essential-item">
                    <div class="calc-essential-value">${formatPrice(downPayment)}</div>
                    <div class="calc-essential-label">Down Payment</div>
                  </div>
                  <div class="calc-essential-item">
                    <div class="calc-essential-value">${formatPrice(monthly)}<span class="calc-mo">/mo</span></div>
                    <div class="calc-essential-label">Monthly Payment</div>
                  </div>
                  <div class="calc-essential-item">
                    <div class="calc-essential-value">${formatPrice(weekly)}<span class="calc-mo">/wk</span></div>
                    <div class="calc-essential-label">Weekly Payment</div>
                  </div>
                `}
              </div>
              <details class="calc-details">
                <summary>Show breakdown</summary>
                <div class="calc-details-content">
                  <div class="calc-breakdown-row">
                    <span>Your Cost</span>
                    <span>${formatPrice(cost)}</span>
                  </div>
                  <div class="calc-breakdown-row">
                    <span>Markup (× ${plan.markup})</span>
                    <span>+${formatPrice(total - cost)}</span>
                  </div>
                  <div class="calc-breakdown-row total">
                    <span>Total Price</span>
                    <span>${formatPrice(total)}</span>
                  </div>
                  ${!isBuyNow ? `
                    <div class="calc-breakdown-row" style="margin-top:0.5rem">
                      <span>10% Down</span>
                      <span>${formatPrice(downPayment)}</span>
                    </div>
                    <div class="calc-breakdown-row">
                      <span>Remaining</span>
                      <span>${formatPrice(remaining)}</span>
                    </div>
                    <div class="calc-breakdown-row">
                      <span>÷ ${plan.months} months</span>
                      <span>${formatPrice(monthly)}/mo</span>
                    </div>
                  ` : ''}
                </div>
              </details>
            </div>
          `;
        });

        resultsHTML += '</div>';
        document.getElementById('calcResults').innerHTML = resultsHTML;
      }
